name: release

on:
  push:
    tags: ['v*']
  workflow_dispatch:

jobs:
  build:
    name: build-${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            archive: tar.gz
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            archive: tar.gz
            cross: true
          - os: macos-13
            target: x86_64-apple-darwin
            archive: tar.gz
          - os: macos-latest
            target: aarch64-apple-darwin
            archive: tar.gz
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            archive: zip
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: install cross
        if: matrix.cross
        run: cargo install cross --locked

      - name: build
        shell: bash
        run: |
          if [ "${{ matrix.cross }}" = "true" ]; then
            cross build --release -p git-fs --target ${{ matrix.target }}
          else
            cargo build --release -p git-fs --target ${{ matrix.target }}
          fi

      - name: package
        shell: bash
        run: |
          mkdir -p dist
          NAME="git-fs-${{ matrix.target }}"
          BIN_DIR="target/${{ matrix.target }}/release"
          if [ "${{ matrix.archive }}" = "zip" ]; then
            7z a "dist/${NAME}.zip" "./${BIN_DIR}/git-fs.exe" "./${BIN_DIR}/git-fs-mcp.exe"
          else
            tar -C "${BIN_DIR}" -czf "dist/${NAME}.tar.gz" git-fs git-fs-mcp
          fi

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.target }}
          path: dist/*

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: checksums
        run: |
          cd dist
          sha256sum * > SHA256SUMS

      - uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
